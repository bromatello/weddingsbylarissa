repos:
  # 1. Standard Community Hooks (Formatting & Safety)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
 #     - id: trailing-whitespace
 #     - id: end-of-file-fixer
      - id: check-yaml
        exclude: wedding-site-chart/templates/

  # 2. Secret Detection (Gitleaks)
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.0
    hooks:
      - id: gitleaks

# 3. Static Analysis (SonarCloud)
  - repo: local
    hooks:
      - id: sonar-scanner
        name: SonarScanner (SonarCloud)
        entry: powershell
        args:
          - -NoProfile
          - -Command
          - "$token = $env:SONAR_TOKEN; if (-not $token) { $token = [Environment]::GetEnvironmentVariable('SONAR_TOKEN','User') }; if (-not $token) { Write-Error 'SONAR_TOKEN is not set (process or user env).'; exit 1 }; sonar-scanner --define sonar.token=$token --define sonar.scanner.skipJreProvisioning=true --define project.settings=sonar-project.local.properties"
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

  - repo: local
    hooks:
      # Trivy scanning modes:
      # - trivy-scan-quick: runs on pre-commit for fast feedback (only when dependency files are staged)
      # - trivy-scan: full repository scan for first-time/manual verification (`pre-commit run trivy-scan --all-files -v`)
      - id: trivy-scan-quick
        name: Trivy Vulnerability Scan (Quick)
        entry: powershell
        args:
          - -NoProfile
          - -Command
          - |
            if ($env:CI -eq 'true') {
              Write-Host 'Skipping quick Trivy scan in CI.'
              exit 0
            }

            $dependencyPattern = '^(package-lock\.json|package\.json|requirements\.txt|pyproject\.toml|Pipfile\.lock|go\.mod|go\.sum|pom\.xml|build\.gradle|Cargo\.toml|Cargo\.lock)$'
            $changedFiles = git diff --cached --name-only
            $changedDependencyFiles = $changedFiles | Where-Object { $_ -match $dependencyPattern }

            if (-not $changedDependencyFiles) {
              Write-Host 'No dependency files changed. Skipping quick Trivy scan.'
              exit 0
            }

            $trivyCmd = (Get-Command trivy -ErrorAction SilentlyContinue).Source
            if ([string]::IsNullOrWhiteSpace($trivyCmd)) {
              $trivyFallback = Join-Path $env:LOCALAPPDATA 'Microsoft\WinGet\Packages\AquaSecurity.Trivy_Microsoft.Winget.Source_8wekyb3d8bbwe\trivy.exe'
              if (Test-Path $trivyFallback) {
                $trivyCmd = $trivyFallback
              }
            }

            if ([string]::IsNullOrWhiteSpace($trivyCmd)) {
              Write-Error 'Trivy is not installed or not discoverable. Install with: winget install --id AquaSecurity.Trivy -e'
              exit 1
            }

            Write-Host 'Running quick Trivy vulnerability scan...'
            & $trivyCmd fs --scanners vuln --vuln-type library --severity HIGH,CRITICAL --skip-dirs .git --skip-dirs node_modules --skip-dirs coverage --exit-code 1 --no-progress .

        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: trivy-scan
        name: Trivy Vulnerability Scan (Full)
        entry: powershell
        args:
          - -NoProfile
          - -Command
          - |
            $trivyCmd = (Get-Command trivy -ErrorAction SilentlyContinue).Source
            if ([string]::IsNullOrWhiteSpace($trivyCmd)) {
              $trivyFallback = Join-Path $env:LOCALAPPDATA 'Microsoft\WinGet\Packages\AquaSecurity.Trivy_Microsoft.Winget.Source_8wekyb3d8bbwe\trivy.exe'
              if (Test-Path $trivyFallback) {
                $trivyCmd = $trivyFallback
              }
            }

            if ([string]::IsNullOrWhiteSpace($trivyCmd)) {
              Write-Error 'Trivy is not installed or not discoverable. Install with: winget install --id AquaSecurity.Trivy -e'
              exit 1
            }

            Write-Host 'Running full Trivy vulnerability scan...'
            & $trivyCmd fs --scanners vuln --vuln-type library --severity HIGH,CRITICAL --skip-dirs .git --skip-dirs node_modules --skip-dirs coverage --exit-code 1 --no-progress .

        language: system
        pass_filenames: false
        always_run: true
        stages: [manual]

