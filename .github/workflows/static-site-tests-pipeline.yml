name: Wedding Site checks

on:
  push:
    branches:
      - '**'
  pull_request:
    branches: [ "main" ]
    types: [opened, synchronize, labeled, unlabeled]

jobs:
  # 1. Setup Job: Generate the IDs once for the entire workflow
  setup:
    runs-on: ubuntu-latest
    outputs:
      traceparent: ${{ steps.trace.outputs.traceparent }}
      trace_id: ${{ steps.trace.outputs.trace_id }}
      pipeline_start_ts: ${{ steps.pipeline_start.outputs.pipeline_start_ts }}
    steps:
      - name: Generate Trace Context
        id: trace
        run: |
          TRACE_ID=$(openssl rand -hex 16)
          SPAN_ID=$(openssl rand -hex 8)
          echo "traceparent=00-${TRACE_ID}-${SPAN_ID}-01" >> $GITHUB_OUTPUT
          echo "trace_id=${TRACE_ID}" >> $GITHUB_OUTPUT

      - name: Debug IDs (Setup)
        run: |
          echo "--- INITIAL ID GENERATION ---"
          echo "Trace ID: ${{ steps.trace.outputs.trace_id }}"
          echo "GitHub Run ID: ${{ github.run_id }}"

      - name: Push pipeline start metric (Prometheus)
        id: pipeline_start
        continue-on-error: true
        run: |
          START_TS=$(date +%s)
          echo "pipeline_start_ts=${START_TS}" >> $GITHUB_OUTPUT
          TARGET_URL="${PUSHGATEWAY_URL:-http://localhost:9091}/metrics/job/ac_pipeline_run/instance/0010"
          curl -sS -X POST "${TARGET_URL}" \
            -H "Content-Type: text/plain" \
            --data-binary "pipeline_run_start_timestamp{run_number=\"1\",environment=\"${{ github.ref_name }}\",source=\"${{ github.event_name }}\"} ${START_TS}"

  # 2. Pre-commit checks
  precommit:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Start timer
        run: echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

      - uses: actions/checkout@v4

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit hooks
        run: pre-commit run --all-files
        env:
          SKIP: sonar-scanner,trivy-scan-quick,trivy-scan

      - name: End timer and Telemetry
        if: always()
        run: |
          DURATION=$(( $(date +%s) - START_TIME ))
          # Metric Ingest
          curl -X POST "${{ secrets.DT_URL }}/api/v2/metrics/ingest" \
            -H "Authorization: Api-Token ${{ secrets.DT_API_TOKEN }}" \
            -H "Content-Type: text/plain" \
            -H "traceparent: ${{ needs.setup.outputs.traceparent }}" \
            --data-raw "pipeline.stage.duration,stage=precommit,status=${{ job.status }},pipeline_id=${{ github.run_id }},dt.trace_id=${{ needs.setup.outputs.trace_id }} $DURATION"
          
          # Event Ingest
          curl -X POST "${{ secrets.DT_URL }}/api/v2/events/ingest" \
            -H "Authorization: Api-Token ${{ secrets.DT_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"eventType\": \"CUSTOM_ANNOTATION\",
              \"title\": \"Stage: Precommit ${{ job.status }}\",
              \"properties\": {
                \"pipeline_id\": \"${{ github.run_id }}\",
                \"dt.trace_id\": \"${{ needs.setup.outputs.trace_id }}\",
                \"stage\": \"precommit\",
                \"status\": \"${{ job.status }}\",
                \"duration\": \"${DURATION}s\"
              }
            }"

  # 3. Security Scanning
  security:
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Start timer
        run: echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret Detection
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: CodeQL Init
        uses: github/codeql-action/init@v3
        with:
          languages: 'javascript-typescript'

      - name: CodeQL Analyze
        uses: github/codeql-action/analyze@v3

      - name: End timer and Telemetry
        if: always()
        run: |
          DURATION=$(( $(date +%s) - START_TIME ))
          curl -X POST "${{ secrets.DT_URL }}/api/v2/metrics/ingest" \
            -H "Authorization: Api-Token ${{ secrets.DT_API_TOKEN }}" \
            -H "Content-Type: text/plain" \
            -H "traceparent: ${{ needs.setup.outputs.traceparent }}" \
            --data-raw "pipeline.stage.duration,stage=security,status=${{ job.status }},pipeline_id=${{ github.run_id }},dt.trace_id=${{ needs.setup.outputs.trace_id }} $DURATION"
          
          curl -X POST "${{ secrets.DT_URL }}/api/v2/events/ingest" \
            -H "Authorization: Api-Token ${{ secrets.DT_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"eventType\": \"CUSTOM_ANNOTATION\",
              \"title\": \"Stage: Security ${{ job.status }}\",
              \"properties\": {
                \"pipeline_id\": \"${{ github.run_id }}\",
                \"dt.trace_id\": \"${{ needs.setup.outputs.trace_id }}\",
                \"stage\": \"security\",
                \"status\": \"${{ job.status }}\",
                \"duration\": \"${DURATION}s\"
              }
            }"

  # 4. Quality and Tests
  quality_and_tests:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Start timer
        run: echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install and Test
        run: |
          npm install --ignore-scripts
          npm test -- --coverage || echo "No tests defined yet"

      - name: SonarCloud Scan
        if: ${{ github.event_name == 'push' || !contains(github.event.pull_request.labels.*.name, 'skip-sonar') }}
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          SONAR_TOKEN: "${{ secrets.SONAR_TOKEN }}"

      - name: End timer and Telemetry
        if: always()
        run: |
          DURATION=$(( $(date +%s) - START_TIME ))
          curl -X POST "${{ secrets.DT_URL }}/api/v2/metrics/ingest" \
            -H "Authorization: Api-Token ${{ secrets.DT_API_TOKEN }}" \
            -H "Content-Type: text/plain" \
            -H "traceparent: ${{ needs.setup.outputs.traceparent }}" \
            --data-raw "pipeline.stage.duration,stage=quality,status=${{ job.status }},pipeline_id=${{ github.run_id }},dt.trace_id=${{ needs.setup.outputs.trace_id }} $DURATION"
          
          curl -X POST "${{ secrets.DT_URL }}/api/v2/events/ingest" \
            -H "Authorization: Api-Token ${{ secrets.DT_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"eventType\": \"CUSTOM_ANNOTATION\",
              \"title\": \"Stage: Quality ${{ job.status }}\",
              \"properties\": {
                \"pipeline_id\": \"${{ github.run_id }}\",
                \"dt.trace_id\": \"${{ needs.setup.outputs.trace_id }}\",
                \"stage\": \"quality\",
                \"status\": \"${{ job.status }}\",
                \"duration\": \"${DURATION}s\"
              }
            }"

  # 5. Docker Scout
  docker_scout:
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Start timer
        run: echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: "${{ secrets.DOCKERHUB_USERNAME }}"
          password: "${{ secrets.DOCKERHUB_TOKEN }}"

      - name: Build and Scout
        run: |
          docker build -t weddingsbylarissa:test .

      - uses: docker/scout-action@v1
        with:
          command: cves
          image: weddingsbylarissa:test
          exit-code: false

      - name: End timer and Telemetry
        if: always()
        run: |
          DURATION=$(( $(date +%s) - START_TIME ))
          PIPELINE_END_TS=$(date +%s)
          PIPELINE_START_TS=${{ needs.setup.outputs.pipeline_start_ts }}
          PIPELINE_DURATION_MS=$(( (PIPELINE_END_TS - PIPELINE_START_TS) * 1000 ))
          PIPELINE_STATUS=$(echo "${{ job.status }}" | tr '[:lower:]' '[:upper:]')

          TARGET_URL="${PUSHGATEWAY_URL:-http://localhost:9091}/metrics/job/ac_pipeline_run/instance/0010"
          printf -v PROM_PAYLOAD 'pipeline_run_end_timestamp{run_number="%s",environment="%s",source="%s",status="%s"} %s\npipeline_run_duration_ms{run_number="%s",environment="%s",source="%s",status="%s"} %s' "${{ github.run_number }}" "${{ github.ref_name }}" "${{ github.event_name }}" "${PIPELINE_STATUS}" "${PIPELINE_END_TS}" "${{ github.run_number }}" "${{ github.ref_name }}" "${{ github.event_name }}" "${PIPELINE_STATUS}" "${PIPELINE_DURATION_MS}"
          curl -sS -X POST "${TARGET_URL}" \
            -H "Content-Type: text/plain" \
            --data-binary "${PROM_PAYLOAD}" || true

          curl -X POST "${{ secrets.DT_URL }}/api/v2/metrics/ingest" \
            -H "Authorization: Api-Token ${{ secrets.DT_API_TOKEN }}" \
            -H "Content-Type: text/plain" \
            -H "traceparent: ${{ needs.setup.outputs.traceparent }}" \
            --data-raw "pipeline.stage.duration,stage=docker_scout,status=${{ job.status }},pipeline_id=${{ github.run_id }},dt.trace_id=${{ needs.setup.outputs.trace_id }} $DURATION"
          
          curl -X POST "${{ secrets.DT_URL }}/api/v2/events/ingest" \
            -H "Authorization: Api-Token ${{ secrets.DT_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"eventType\": \"CUSTOM_ANNOTATION\",
              \"title\": \"Stage: Docker Scout ${{ job.status }}\",
              \"properties\": {
                \"pipeline_id\": \"${{ github.run_id }}\",
                \"dt.trace_id\": \"${{ needs.setup.outputs.trace_id }}\",
                \"stage\": \"docker_scout\",
                \"status\": \"${{ job.status }}\",
                \"duration\": \"${DURATION}s\"
              }
            }"