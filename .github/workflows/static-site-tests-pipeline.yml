name: Wedding Site checks

on:
  push:
    branches:
      - '**'
  pull_request:
    branches: [ "main" ]
    types: [opened, synchronize, labeled, unlabeled]

jobs:
  # 1. Setup Job: Generate the IDs once for the entire workflow
  setup:
    runs-on: ubuntu-latest
    outputs:
      traceparent: ${{ steps.trace.outputs.traceparent }}
      trace_id: ${{ steps.trace.outputs.trace_id }}
    steps:
      - name: Generate Trace Context
        id: trace
        run: |
          # Generate a 32-char hex Trace ID and a 16-char hex Span ID
          TRACE_ID=$(openssl rand -hex 16)
          SPAN_ID=$(openssl rand -hex 8)
          echo "traceparent=00-${TRACE_ID}-${SPAN_ID}-01" >> $GITHUB_OUTPUT
          echo "trace_id=${TRACE_ID}" >> $GITHUB_OUTPUT

      - name: Debug IDs (Setup)
        run: |
          echo "--- INITIAL ID GENERATION ---"
          echo "Trace ID: ${{ steps.trace.outputs.trace_id }}"
          echo "Traceparent: 00-${{ steps.trace.outputs.trace_id }}-${SPAN_ID}-01"
          echo "GitHub Run ID: ${{ github.run_id }}"

  # 2. Pre-commit checks
  precommit:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Debug IDs (Precommit)
        run: |
          echo "Job: Precommit"
          echo "Using Traceparent: ${{ needs.setup.outputs.traceparent }}"
          echo "Using Run ID: ${{ github.run_id }}"

      - name: Start timer
        run: echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

      - uses: actions/checkout@v4

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit hooks
        run: pre-commit run --all-files
        env:
          SKIP: sonar-scanner,trivy-scan-quick,trivy-scan

      - name: End timer and calculate duration
        if: always()
        run: |
          DURATION=$(( $(date +%s) - START_TIME ))
          echo "PIPELINE_DURATION_SECONDS=$DURATION" >> $GITHUB_ENV

      - name: Dynatrace Telemetry - Precommit
        if: always()
        run: |
          # Metrics with Traceparent and Pipeline ID
          curl -X POST "${{ secrets.DT_URL }}/api/v2/metrics/ingest" \
            -H "Authorization: Api-Token ${{ secrets.DT_API_TOKEN }}" \
            -H "Content-Type: text/plain" \
            -H "traceparent: ${{ needs.setup.outputs.traceparent }}" \
            --data-raw "pipeline.stage.duration,stage=precommit,status=${{ job.status }},pipeline_id=${{ github.run_id }},dt.trace_id=${{ needs.setup.outputs.trace_id }} ${PIPELINE_DURATION_SECONDS}"
          
          # Event with Pipeline ID for dashboard grouping
          curl -X POST "${{ secrets.DT_URL }}/api/v2/events/ingest" \
            -H "Authorization: Api-Token ${{ secrets.DT_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"eventType\": \"CUSTOM_ANNOTATION\",
              \"title\": \"Stage: Precommit ${{ job.status }}\",
              \"properties\": {
                \"pipeline_id\": \"${{ github.run_id }}\",
                \"dt.trace_id\": \"${{ needs.setup.outputs.trace_id }}\",
                \"stage\": \"precommit\",
                \"status\": \"${{ job.status }}\",