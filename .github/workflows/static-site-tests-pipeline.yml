name: Wedding Site checks

on:
  push:
    branches:
      - '**'
  pull_request:
    branches: [ "main" ]

jobs:
  # 0. Pre-commit checks
  precommit:
    runs-on: ubuntu-latest
    steps:
      - name: Start timer
        run: echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

      - uses: actions/checkout@v4

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit hooks
        run: pre-commit run --all-files
        env:
          SKIP: sonar-scanner

      - name: End timer and calculate duration
        if: always()
        run: |
          DURATION=$(( $(date +%s) - START_TIME ))
          echo "PIPELINE_DURATION_SECONDS=$DURATION" >> $GITHUB_ENV

      - name: Dynatrace Telemetry - Precommit
        if: always()
        run: |
          curl -X POST "${{ secrets.DT_URL }}/api/v2/metrics/ingest" \
            -H "Authorization: Api-Token ${{ secrets.DT_API_TOKEN }}" \
            -H "Content-Type: text/plain" \
            --data-raw "pipeline.stage.duration,stage=precommit,status=${{ job.status }} ${PIPELINE_DURATION_SECONDS}"
          
          curl -X POST "${{ secrets.DT_URL }}/api/v2/events/ingest" \
            -H "Authorization: Api-Token ${{ secrets.DT_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"eventType\": \"CUSTOM_ANNOTATION\",
              \"title\": \"Stage: Precommit ${{ job.status }}\",
              \"properties\": {
                \"stage\": \"precommit\",
                \"status\": \"${{ job.status }}\",
                \"duration\": \"${PIPELINE_DURATION_SECONDS}s\",
                \"run_url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
              }
            }"

  # 1. Security Scanning
  security:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Start timer
        run: echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret Detection
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: CodeQL Init
        uses: github/codeql-action/init@v3
        with:
          languages: 'javascript-typescript'

      - name: CodeQL Analyze
        uses: github/codeql-action/analyze@v3

      - name: End timer and Telemetry
        if: always()
        run: |
          DURATION=$(( $(date +%s) - START_TIME ))
          curl -X POST "${{ secrets.DT_URL }}/api/v2/metrics/ingest" \
            -H "Authorization: Api-Token ${{ secrets.DT_API_TOKEN }}" \
            -H "Content-Type: text/plain" \
            --data-raw "pipeline.stage.duration,stage=security,status=${{ job.status }} $DURATION"
          
          curl -X POST "${{ secrets.DT_URL }}/api/v2/events/ingest" \
            -H "Authorization: Api-Token ${{ secrets.DT_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"eventType\": \"CUSTOM_ANNOTATION\", \"title\": \"Stage: Security ${{ job.status }}\", \"properties\": {\"stage\": \"security\", \"status\": \"${{ job.status }}\", \"duration\": \"${DURATION}s\"}}"

  # 2. Quality and Tests
  quality_and_tests:
    runs-on: ubuntu-latest
    steps:
      - name: Start timer
        run: echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install and Test
        run: |
          npm install --ignore-scripts
          npm test -- --coverage || echo "No tests defined yet"

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          SONAR_TOKEN: "${{ secrets.SONAR_TOKEN }}"

      - name: End timer and Telemetry
        if: always()
        run: |
          DURATION=$(( $(date +%s) - START_TIME ))
          curl -X POST "${{ secrets.DT_URL }}/api/v2/metrics/ingest" \
            -H "Authorization: Api-Token ${{ secrets.DT_API_TOKEN }}" \
            -H "Content-Type: text/plain" \
            --data-raw "pipeline.stage.duration,stage=quality,status=${{ job.status }} $DURATION"
          
          curl -X POST "${{ secrets.DT_URL }}/api/v2/events/ingest" \
            -H "Authorization: Api-Token ${{ secrets.DT_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"eventType\": \"CUSTOM_ANNOTATION\", \"title\": \"Stage: Quality ${{ job.status }}\", \"properties\": {\"stage\": \"quality\", \"status\": \"${{ job.status }}\", \"duration\": \"${DURATION}s\"}}"

  # 3. Docker Scout
  docker_scout:
    runs-on: ubuntu-latest
    steps:
      - name: Start timer
        run: echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: "${{ secrets.DOCKERHUB_USERNAME }}"
          password: "${{ secrets.DOCKERHUB_TOKEN }}"

      - name: Build and Scout
        run: |
          docker build -t weddingsbylarissa:test .

      - uses: docker/scout-action@v1
        with:
          command: cves
          image: weddingsbylarissa:test
          exit-code: false

      - name: End timer and Telemetry
        if: always()
        run: |
          DURATION=$(( $(date +%s) - START_TIME ))
          curl -X POST "${{ secrets.DT_URL }}/api/v2/metrics/ingest" \
            -H "Authorization: Api-Token ${{ secrets.DT_API_TOKEN }}" \
            -H "Content-Type: text/plain" \
            --data-raw "pipeline.stage.duration,stage=docker_scout,status=${{ job.status }} $DURATION"

  # 4. Deploy
  deploy:
    needs: [precommit, security, quality_and_tests, docker_scout]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Start timer
        run: echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: "${{ secrets.DOCKERHUB_USERNAME }}"
          password: "${{ secrets.DOCKERHUB_TOKEN }}"

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: chrisbromatello/wedding-site:latest,chrisbromatello/wedding-site:${{ github.sha }}

      - name: End timer and Telemetry
        if: always()
        run: |
          DURATION=$(( $(date +%s) - START_TIME ))
          curl -X POST "${{ secrets.DT_URL }}/api/v2/metrics/ingest" \
            -H "Authorization: Api-Token ${{ secrets.DT_API_TOKEN }}" \
            -H "Content-Type: text/plain" \
            --data-raw "pipeline.stage.duration,stage=deploy,status=${{ job.status }},env=prod $DURATION"

  # 5. Smoke Test
  smoke_test:
    needs: [deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Start timer
        run: echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

      - name: Run Smoke Test
        run: |
          docker pull chrisbromatello/wedding-site:latest
          docker run -d --rm --name smoke-check -p 5001:5000 chrisbromatello/wedding-site:latest
          sleep 10
          curl --fail http://localhost:5001 || exit 1

      - name: End timer and Telemetry
        if: always()
        run: |
          DURATION=$(( $(date +%s) - START_TIME ))
          curl -X POST "${{ secrets.DT_URL }}/api/v2/metrics/ingest" \
            -H "Authorization: Api-Token ${{ secrets.DT_API_TOKEN }}" \
            -H "Content-Type: text/plain" \
            --data-raw "pipeline.stage.duration,stage=smoke_test,status=${{ job.status }} $DURATION"

  # 6. Harness Hand-off
  harness_deploy:
    needs: [smoke_test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Harness
        run: |
          curl -X POST -H "Content-Type: application/json" \
            -d "{\"application\": \"Wedding_Project\", \"version\": \"${{ github.sha }}\"}" \
            "${{ secrets.HARNESS_WEBHOOK_URL }}"